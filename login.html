<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onepost - Sign in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#06060a;--border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.15);--accent:#8b5cf6;--accent2:#a78bfa;--text:#f8f8ff;--text2:rgba(248,248,255,0.6);--text3:rgba(248,248,255,0.35);--green:#34d399;--red:#f87171;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:rgba(139,92,246,0.07);top:-150px;left:-100px;}
.orb-2{width:400px;height:400px;background:rgba(96,165,250,0.05);bottom:-100px;right:-100px;}
.card{position:relative;z-index:1;width:100%;max-width:420px;padding:24px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(20px);}
.logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;}
.card-sub{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px;}
.tabs{display:flex;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;margin-bottom:24px;}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:14px;font-weight:600;transition:all .2s;}
.tab.on{background:var(--accent);color:#fff;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;width:100%;}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;border:none;cursor:pointer;padding:14px;border-radius:12px;font-size:15px;font-weight:700;margin-top:8px;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.btn-google{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border-bright);color:var(--text);cursor:pointer;padding:12px;border-radius:12px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;text-align:center;display:none;}
.msg.ok{background:rgba(52,211,153,0.1);color:var(--green);}
.msg.err{background:rgba(248,113,113,0.1);color:var(--red);}
.back{text-align:center;margin-top:20px;font-size:13px;color:var(--text3);}
.back a{color:var(--accent2);text-decoration:none;}
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="card">
<div class="logo">onepost</div>
<p class="card-sub">One post. Every platform.</p>
<div class="tabs">
<button class="tab on" id="signinTab" onclick="setTab('signin')">Sign in</button>
<button class="tab" id="signupTab" onclick="setTab('signup')">Create account</button>
</div>
<div id="signinForm">
<div class="field"><label>Email</label><input type="email" id="siEmail" placeholder="you@example.com"></div>
<div class="field"><label>Password</label><input type="password" id="siPass" placeholder="min 8 chars"></div>
<button class="btn" onclick="signIn()">Sign in</button>
</div>
<div id="signupForm" style="display:none">
<div class="field"><label>Email</label><input type="email" id="suEmail" placeholder="you@example.com"></div>
<div class="field"><label>Password</label><input type="password" id="suPass" placeholder="min 8 chars"></div>
<button class="btn" onclick="signUp()">Start 7-day free trial</button>
</div>
<div class="divider">or</div>
<button class="btn-google" onclick="signInGoogle()">Continue with Google</button>
<div class="msg" id="msg"></div>
<p class="back"><a href="/">Back to onepost.io</a></p>
</div>
<script>
const SUPABASE_URL='YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY='YOUR_SUPABASE_ANON_KEY';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
sb.auth.getSession().then(({data})=>{if(data.session)window.location.href='/app.html';});
function setTab(t){document.getElementById('signinTab').classList.toggle('on',t==='signin');document.getElementById('signupTab').classList.toggle('on',t==='signup');document.getElementById('signinForm').style.display=t==='signin'?'block':'none';document.getElementById('signupForm').style.display=t==='signup'?'block':'none';}
function showMsg(txt,type){const el=document.getElementById('msg');el.textContent=txt;el.className='msg '+type;el.style.display=txt?'block':'none';}
async function signIn(){const email=document.getElementById('siEmail').value,pass=document.getElementById('siPass').value;if(!email||!pass)return showMsg('Fill in all fields','err');const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error)return showMsg(error.message,'err');window.location.href='/app.html';}
async function signUp(){const email=document.getElementById('suEmail').value,pass=document.getElementById('suPass').value;if(!email||!pass)return showMsg('Fill in all fields','err');if(pass.length<8)return showMsg('Password min 8 chars','err');const{error}=await sb.auth.signUp({email,password:pass});if(error)return showMsg(error.message,'err');showMsg('Check email to confirm, then sign in.','ok');}
async function signInGoogle(){await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/app.html'}});}
</script>
</body>
</html>
